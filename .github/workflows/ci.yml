name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Rust fmt check
        uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
        working-directory: managym

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: managym

  rust:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            managym -> target

      - name: Rust tests
        working-directory: managym
        run: cargo test

  python-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/model/ tests/infra/

  integration:
    name: Integration (${{ matrix.os }})
    needs: [lint, rust]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            managym -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            managym/pyproject.toml
            uv.lock

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'managym/pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          pip install uv maturin
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Build managym extension
        run: |
          source .venv/bin/activate
          cd managym
          maturin develop --features python

      - name: Integration tests
        run: |
          source .venv/bin/activate
          pytest tests/env/ tests/agent/

      - name: Enum smoke test
        run: |
          source .venv/bin/activate
          python -c "import managym; assert int(managym.ZoneEnum.STACK) == 4"

  result:
    name: CI Result
    runs-on: ubuntu-latest
    needs: [lint, rust, python-unit, integration]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "lint: ${{ needs.lint.result }}"
          echo "rust: ${{ needs.rust.result }}"
          echo "python-unit: ${{ needs.python-unit.result }}"
          echo "integration: ${{ needs.integration.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.rust.result }}" != "success" ] || \
             [ "${{ needs.python-unit.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ]; then
            exit 1
          fi
